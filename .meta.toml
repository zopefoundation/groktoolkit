# Generated with zope.meta (https://zopemeta.readthedocs.io/) from:
# https://github.com/zopefoundation/meta/tree/master/src/zope/meta/toolkit
[meta]
template = "toolkit"
commit-id = "966ac0d8"

[python]
with-sphinx-doctests = false
with-docs = true
with-future-python = true
with-pypy = true
with-macos = false
with-windows = false
with-free-threaded-python = false

[tox]
testenv-commands = [
    "{envdir}/bin/test {posargs:-cv}",
    ]
testenv-setenv = [
    "zope_i18n_compile_mo_files=True",
    ]
testenv-additional = [
    "",
    "[testenv:checkversions]",
    "commands_pre =",
    "    {envbindir}/buildout -nc {toxinidir}/buildout.cfg buildout:directory={envdir} install checkversions",
    "commands =",
    "    {envdir}/bin/checkversions grok-versions.cfg []",
    ]

[coverage]
fail-under = "not applicable"

[check-manifest]
additional-ignores = [
    "dependabot/*",
    "docs/_build/html/*",
    "docs/_build/html/*/*",
    "docs/_build/html/*/*/*",
    "docs/_build/html/*/*/*/*",
    ]
