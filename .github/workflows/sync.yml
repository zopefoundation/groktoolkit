name: Sync Requirements

on:
  pull_request:
permissions:
  contents: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.COMMIT_ACTIONS_TOKEN }}
      - uses: actions/setup-python@v7
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install vereqsyn
      - name: Syncing grok-versions.cfg with requirements.txt
        run: |
          vereqsyn grok-versions.cfg dependabot/requirements.txt
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add grok-versions.cfg dependabot/requirements.txt
          git diff --cached --quiet || git commit -m "Version synchronization"
          git push
